<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dismantle Performance | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
      <div class="page-header">
        <div class="page-breadcrumb"><a href="../../index.html">Dashboard</a><span class="sep">/</span><span>Area</span><span class="sep">/</span><span class="text-dark">Dismantle Performance</span></div>
        <h1 class="page-title">Dismantle Performance</h1>
        <p class="page-description">Monitoring read-only performa Dismantle berdasarkan Work Order per Account Executive.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3"><label>Bulan</label><select id="filterMonth" class="form-select form-select-sm"></select></div>
          <div class="col-6 col-md-2"><label>Tahun</label><select id="filterYear" class="form-select form-select-sm"></select></div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6 col-md-4"><div class="kpi-card mono"><div class="kpi-label">Total Success</div><div class="kpi-value" id="kpi-success">0</div></div></div>
        <div class="col-6 col-md-4"><div class="kpi-card mono"><div class="kpi-label">Total Failed</div><div class="kpi-value" id="kpi-failed">0</div></div></div>
        <div class="col-6 col-md-4"><div class="kpi-card mono"><div class="kpi-label">Total Progress</div><div class="kpi-value" id="kpi-progress">0</div></div></div>
      </div>

      <div class="panel-card">
        <div class="panel-title">Tabel Performance Dismantle Sales</div>
        <div id="dismantleTable"></div>
      </div>
    </main>
  </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Detail Performance Dismantle — <span id="detailName"></span></h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div id="detailInfo" class="row g-2 mb-3"></div>
        <div class="row g-2 mb-3 align-items-end">
          <div class="col-auto"><label class="form-label small mb-0">Bulan</label><select id="detailMonth" class="form-select form-select-sm"></select></div>
          <div class="col-auto"><label class="form-label small mb-0">Tahun</label><select id="detailYear" class="form-select form-select-sm"></select></div>
        </div>
        <div id="detailWoTable"></div>
      </div>
      <div class="modal-footer"><span class="text-muted small me-auto">Mode read-only sesuai ERP.</span><button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Tutup</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>window.BASE="../../"; window.ACTIVE_MENU="area-dismantle-performance";</script>
<script src="../../assets/js/layout.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
  const currentYear = new Date().getFullYear();
  let selMonth = new Date().getMonth();
  let selYear = currentYear;
  let sortSt = { key: null, dir: "asc" };
  const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

  filterMonth.innerHTML = monthNames.map((m,i)=>`<option value="${i}" ${i===selMonth?"selected":""}>${m}</option>`).join("");
  filterYear.innerHTML = [currentYear-1,currentYear,currentYear+1].map(y=>`<option value="${y}" ${y===currentYear?"selected":""}>${y}</option>`).join("");

  function seed(sales,field) {
    const s = selYear + selMonth + sales.split('').reduce((n,c)=>n+c.charCodeAt(0),0);
    const map = {
      self_success: 3+(s%12), self_failed: s%4, self_progress: s%3, self_miss: s%3,
      bm_success: 2+(s%9), bm_failed: s%3, bm_progress: s%3, bm_miss: s%2
    };
    return map[field] || 0;
  }

  function parseDate(str) {
    const p = str.split('-');
    if (p.length!==3) return null;
    return new Date(2000+parseInt(p[2],10), MONTHS[p[1]], parseInt(p[0],10));
  }

  function salesData() {
    const branch = getGlobalBranch();
    const dismantleSales = [...new Set(WO_DISMANTLE.filter(w => !branch || w.branch===branch).map(w => w.sales).filter(Boolean))];
    return dismantleSales.map(s => {
      const ae = AE_DATA.find(a => branch ? a.branch===branch : a.fullname===s);
      return {
        sales_name: s,
        nip: ae ? ae.nip : '-',
        branch: ae ? ae.branch : (branch||'-'),
        self_success: seed(s,'self_success'),
        self_failed: seed(s,'self_failed'),
        self_progress: seed(s,'self_progress'),
        self_miss: seed(s,'self_miss'),
        bm_success: seed(s,'bm_success'),
        bm_failed: seed(s,'bm_failed'),
        bm_progress: seed(s,'bm_progress'),
        bm_miss: seed(s,'bm_miss'),
        get self_total() { return this.self_success+this.self_failed+this.self_progress; },
        get bm_total() { return this.bm_success+this.bm_failed+this.bm_progress; }
      };
    });
  }

  function updateKpi(data) {
    const suc = data.reduce((n,r)=>n+r.self_success+r.bm_success,0);
    const fail = data.reduce((n,r)=>n+r.self_failed+r.bm_failed,0);
    const prog = data.reduce((n,r)=>n+r.self_progress+r.bm_progress,0);
    document.getElementById("kpi-success").textContent = suc;
    document.getElementById("kpi-failed").textContent = fail;
    document.getElementById("kpi-progress").textContent = prog;
  }

  function renderMain() {
    const data = salesData();
    updateKpi(data);
    let rows = [...data];
    if (sortSt.key) rows.sort((a,b)=>((a[sortSt.key]||0)>(b[sortSt.key]||0)?1:-1)*(sortSt.dir==="asc"?1:-1));
    
    const selfCols = ["self_success","self_failed","self_progress","self_total","self_miss"];
    const bmCols = ["bm_success","bm_failed","bm_progress","bm_total","bm_miss"];
    
    const headerRow = `<tr>
      <th class="sortable" data-key="sales_name">Sales</th>
      <th class="sortable" data-key="nip">NIP</th>
      <th colspan="5" class="text-center small bg-light">Self Scheduled</th>
      <th colspan="5" class="text-center small bg-light">BM Scheduled</th>
      <th>Detail</th>
    </tr>`;
    
    const subHeaderRow = `<tr>
      <th></th><th></th>
      ${selfCols.map(c=>`<th class="sortable" data-key="${c}">${c.replace('self_','')}</th>`).join('')}
      ${bmCols.map(c=>`<th class="sortable" data-key="${c}">${c.replace('bm_','')}</th>`).join('')}
      <th></th>
    </tr>`;
    
    dismantleTable.innerHTML = `<div class="table-responsive"><table class="table table-hover align-middle"><thead>${headerRow}${subHeaderRow}</thead><tbody>${
      rows.map(r=>`<tr>
        <td>${r.sales_name}</td>
        <td>${r.nip}</td>
        ${selfCols.map(c=>`<td>${r[c]}</td>`).join('')}
        ${bmCols.map(c=>`<td>${r[c]}</td>`).join('')}
        <td><button class="btn btn-sm btn-outline-primary btn-detail" data-name="${r.sales_name}">Detail</button></td>
      </tr>`).join('')
    }</tbody></table></div>`;
    dismantleTable.querySelectorAll("th.sortable").forEach(th => th.addEventListener("click",()=>{ sortSt.dir = sortSt.key === th.dataset.key && sortSt.dir==="asc" ? "desc" : "asc"; sortSt.key = th.dataset.key; renderMain(); }));
  }

  document.addEventListener("click", e => {
    const btn = e.target.closest(".btn-detail");
    if (!btn) return;
    const name = btn.dataset.name;
    const ae = AE_DATA.find(a => a.fullname===name) || {fullname:name,nip:'-',branch:getGlobalBranch()||'-'};
    document.getElementById("detailName").textContent = name;
    document.getElementById("detailInfo").innerHTML = ['Nama Sales','NIP','Branch'].map((l,i)=>`<div class="col-auto"><div class="detail-row"><div class="detail-label">${l}</div><div class="detail-value">${[name,ae.nip,ae.branch][i]}</div></div></div>`).join('');
    detailMonth.innerHTML = monthNames.map((m,i)=>`<option value="${i}" ${i===selMonth?"selected":""}>${m}</option>`).join("");
    detailYear.innerHTML = [currentYear-1,currentYear,currentYear+1].map(y=>`<option value="${y}" ${y===currentYear?"selected":""}>${y}</option>`).join("");

    function renderDetailWo() {
      const dm = parseInt(detailMonth.value,10);
      const dy = parseInt(detailYear.value,10);
      const woRows = WO_DISMANTLE.filter(w => w.sales===name).map((w,i) => {
        const ed = w.expired_date ? parseDate(w.expired_date) : null;
        const inPeriod = ed && ed.getMonth()===dm && ed.getFullYear()===dy;
        return {...w, inPeriod};
      }).filter(w => w.inPeriod).map((w,i) => {
        const percobaan = (seed(name,'self_success')+i)%5+1;
        const akurasi = percobaan >= 3 ? 'Tepat' : 'Kurang Tepat';
        return [
          w.customer_name, w.pppoe_secret, w.sales, w.terminator,
          percobaan, akurasi,
          w.expired_date.split('-').reverse().join('/'),
          w.status
        ];
      });
      const headers = ['Nama Customer','PPPoE Secret','Surveyor','Assign By','Percobaan','Akurasi','Hasil','Keputusan'];
      detailWoTable.innerHTML = `<div class="table-responsive"><table class="table table-sm table-hover align-middle"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${
        woRows.length ? woRows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('') :
        '<tr><td colspan="8" class="table-empty">Tidak ada data WO Dismantle pada periode ini.</td></tr>'
      }</tbody></table></div>`;
    }

    renderDetailWo();
    detailMonth.addEventListener("change", renderDetailWo);
    detailYear.addEventListener("change", renderDetailWo);
    new bootstrap.Modal(document.getElementById("detailModal")).show();
  });

  filterMonth.addEventListener("change", e => { selMonth=Number(e.target.value); renderMain(); });
  filterYear.addEventListener("change", e => { selYear=Number(e.target.value); renderMain(); });
  window.addEventListener("globalBranchChange", renderMain);
  renderMain();
});
</script>
</body>
</html>
