<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Area & Overlay | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

      <div class="pt-3 pb-2 mb-3 border-bottom">
        <div class="page-breadcrumb">
          <a href="../../index.html">Dashboard</a><span class="sep">/</span>
          <span>Area</span><span class="sep">/</span>
          <span class="text-dark">Open Area &amp; Overlay</span>
        </div>
        <h1 class="h2 mb-0">Open Area &amp; Overlay</h1>
        <p class="text-muted mb-0">Monitoring pencapaian pembukaan area baru dan validasi area overlay pada setiap branch regional.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Branch</label>
            <select id="filterBranch" class="form-select form-select-sm"></select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Bulan</label>
            <select id="filterBulan" class="form-select form-select-sm"></select>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title">
          <span>Capaian Pembukaan Area Regional</span>
          <span class="badge bg-secondary">Target vs Realisasi (Area Primary)</span>
        </div>
        <div style="height: 120px; position: relative;">
          <canvas id="chartRegional"></canvas>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title">Capaian Pembukaan Area per Branch</div>
        <div style="height: 250px; position: relative;">
          <canvas id="chartBranch"></canvas>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title">
          <span>Daftar Area</span>
          <div class="btn-group btn-group-sm" role="group" id="areaTypeTabs">
            <button type="button" class="btn btn-outline-primary active" data-type="all">Semua</button>
            <button type="button" class="btn btn-outline-primary" data-type="primary">Primary</button>
            <button type="button" class="btn btn-outline-primary" data-type="overlay">Overlay</button>
          </div>
        </div>
        <div id="areaTable"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>
  window.BASE = "../../";
  window.ACTIVE_MENU = "area-open";
</script>
<script src="../../assets/js/layout.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  fillBranchSelect(document.getElementById("filterBranch"));
  
  const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
  const currentMonthIdx = new Date().getMonth();
  const filterBulan = document.getElementById("filterBulan");
  let monthOptions = "";
  for(let i=0; i<=11; i++){
     const isSelected = i === currentMonthIdx ? "selected" : "";
     const fullNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
     monthOptions += `<option value="${i}" ${isSelected}>${fullNames[i]} 2026</option>`;
  }
  filterBulan.innerHTML = monthOptions;

  let chartRegInstance = null;
  let chartBrInstance = null;

  function updateChartsAndTable() {
    const selectedBranch = document.getElementById("filterBranch").value;
    const selectedMonth = parseInt(filterBulan.value, 10);
    const selectedMonthStr = monthNames[selectedMonth];
    
    const areaFilteredByMonth = AREA_DATA.filter(a => a.open_date.includes(selectedMonthStr));
    
    const regionalTarget = 2 * BRANCHES.length;
    const branchTarget = 2;
    const regionalRealized = areaFilteredByMonth.filter(a => a.is_primary === 1).length;

    const ctxReg = document.getElementById("chartRegional").getContext("2d");
    if(chartRegInstance) chartRegInstance.destroy();
    chartRegInstance = new Chart(ctxReg, {
      type: 'bar',
      data: {
        labels: ['Regional Malang Raya'],
        datasets: [
          { label: 'Realisasi', data: [regionalRealized], backgroundColor: '#2778c4' },
          { label: 'Target Minimum', data: [regionalTarget], backgroundColor: '#eef1f4', borderColor: '#212529', borderWidth: {right: 2, top:0, bottom:0, left:0} }
        ]
      },
      options: {
        indexAxis: 'y',
        maintainAspectRatio: false,
        scales: { x: { beginAtZero: true, suggestedMax: Math.max(regionalTarget + 2, regionalRealized + 1) } },
        plugins: { legend: { position: 'bottom' } }
      }
    });

    const branchesToDraw = selectedBranch ? [selectedBranch] : BRANCHES;
    const branchRealized = branchesToDraw.map(b => areaFilteredByMonth.filter(a => a.branch === b && a.is_primary === 1).length);
    const branchTargets = branchesToDraw.map(() => branchTarget);

    const ctxBr = document.getElementById("chartBranch").getContext("2d");
    if(chartBrInstance) chartBrInstance.destroy();
    chartBrInstance = new Chart(ctxBr, {
      type: 'bar',
      data: {
        labels: branchesToDraw,
        datasets: [
          { label: 'Realisasi', data: branchRealized, backgroundColor: '#2778c4' },
          { label: 'Target Minimum', data: branchTargets, backgroundColor: '#eef1f4', borderColor: '#212529', borderWidth: {right: 2, top:0, bottom:0, left:0} }
        ]
      },
      options: {
        indexAxis: 'y',
        maintainAspectRatio: false,
        scales: { x: { beginAtZero: true, suggestedMax: Math.max(branchTarget + 2, Math.max(...branchRealized) + 1) } },
        plugins: { legend: { position: 'bottom' } }
      }
    });
    
    table.setFilter(row => typeFilter(row) && (!selectedBranch || row.branch === selectedBranch) && row.open_date.includes(selectedMonthStr));
  }

  let currentType = "all";
  function typeFilter(row){
    if (currentType === "primary") return row.is_primary === 1;
    if (currentType === "overlay") return row.is_primary === 0;
    return true;
  }

  const table = renderSimpleTable({
    mountId: "areaTable",
    data: AREA_DATA,
    searchKeys: ["branch","area_name","area_code"],
    filterFn: r => r.open_date.includes(monthNames[parseInt(filterBulan.value, 10)]),
    columns: [
      {label:"Branch", key:"branch"},
      {label:"Nama Area", key:"area_name"},
      {label:"Kode Area", key:"area_code"},
      {label:"Kategori", render: r => badge(r.is_primary === 1 ? "Primary" : "Overlay")},
      {label:"Tgl Open", key:"open_date"},
      {label:"Cust. Aktif", key:"customer_active"},
      {label:"Aksi", render: r => `<a href="detail.html?branch=${encodeURIComponent(r.branch)}&id=${r.id}" class="btn btn-sm btn-outline-primary">Detail</a>`}
    ]
  });

  document.getElementById("filterBranch").addEventListener("change", updateChartsAndTable);
  document.getElementById("filterBulan").addEventListener("change", updateChartsAndTable);

  document.querySelectorAll("#areaTypeTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#areaTypeTabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentType = btn.dataset.type;
      updateChartsAndTable();
    });
  });
  
  updateChartsAndTable();
});
</script>
</body>
</html>
