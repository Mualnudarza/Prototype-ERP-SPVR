<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Area & Overlay | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

      <div class="pt-3 pb-2 mb-3 border-bottom">
        <div class="page-breadcrumb">
          <a href="../../index.html">Dashboard</a><span class="sep">/</span>
          <span>Area</span><span class="sep">/</span>
          <span class="text-dark">Open Area &amp; Overlay</span>
        </div>
        <h1 class="h2 mb-0">Open Area &amp; Overlay</h1>
        <p class="text-muted mb-0">Monitoring pencapaian pembukaan area baru dan validasi area overlay pada setiap branch regional.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Branch</label>
            <select id="filterBranch" class="form-select form-select-sm"></select>
          </div>
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Bulan</label>
            <select id="filterBulan" class="form-select form-select-sm">
              <option>Januari 2026</option><option selected>Februari 2026</option><option>Maret 2026</option>
              <option>April 2026</option><option>Mei 2026</option><option>Juni 2026</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title">
          <span>Capaian Pembukaan Area Regional</span>
          <span class="badge bg-secondary">Target vs Realisasi (Area Primary)</span>
        </div>
        <div id="bulletRegional"></div>
      </div>

      <div class="panel-card">
        <div class="panel-title">Capaian Pembukaan Area per Branch</div>
        <div id="bulletBranch"></div>
      </div>

      <div class="panel-card">
        <div class="panel-title">
          <span>Daftar Area</span>
          <div class="btn-group btn-group-sm" role="group" id="areaTypeTabs">
            <button type="button" class="btn btn-outline-primary active" data-type="all">Semua</button>
            <button type="button" class="btn btn-outline-primary" data-type="primary">Primary</button>
            <button type="button" class="btn btn-outline-primary" data-type="overlay">Overlay</button>
          </div>
        </div>
        <div id="areaTable"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>
  window.BASE = "../../";
  window.ACTIVE_MENU = "area-open";
</script>
<script src="../../assets/js/layout.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  fillBranchSelect(document.getElementById("filterBranch"));

  // Bullet chart regional (total)
  const totalTarget = AREA_TARGET.reduce((s,a)=>s+a.target,0);
  const totalReal = AREA_TARGET.reduce((s,a)=>s+a.realisasi,0);
  renderBulletCharts("bulletRegional", [{label:"Regional Malang Raya", target: totalTarget, value: totalReal}], {large:true});

  function drawBranchBullets(branchFilter){
    const items = AREA_TARGET.filter(a => !branchFilter || a.branch === branchFilter);
    const mount = document.getElementById("bulletBranch");
    mount.innerHTML = items.map(it => {
      const pct = Math.min(140, Math.round((it.realisasi / it.target) * 100));
      const fillPct = Math.min(100, pct);
      const cls = pct >= 100 ? "over" : (pct >= 70 ? "" : "under");
      return `
        <div class="row align-items-center bullet-chart">
          <div class="col-9">
            <div class="bullet-label">
              <span class="b-name">${it.branch}</span>
              <span class="b-value">${it.realisasi} / ${it.target} (${pct}%)</span>
            </div>
            <div class="bullet-track"><div class="bullet-fill ${cls}" style="width:${fillPct}%"></div></div>
          </div>
          <div class="col-3 text-end">
            <a href="detail.html?branch=${encodeURIComponent(it.branch)}" class="btn btn-sm btn-outline-primary">Detail</a>
          </div>
        </div>`;
    }).join("");
  }
  drawBranchBullets("");

  let currentType = "all";
  function typeFilter(row){
    if (currentType === "primary") return row.is_primary === 1;
    if (currentType === "overlay") return row.is_primary === 0;
    return true;
  }

  const table = renderSimpleTable({
    mountId: "areaTable",
    data: AREA_DATA,
    searchKeys: ["branch","area_name","area_code"],
    filterFn: typeFilter,
    columns: [
      {label:"Branch", key:"branch"},
      {label:"Nama Area", key:"area_name"},
      {label:"Kode Area", key:"area_code"},
      {label:"Kategori", render: r => badge(r.is_primary === 1 ? "Primary" : "Overlay")},
      {label:"Tgl Open", key:"open_date"},
      {label:"Cust. Aktif", key:"customer_active"},
      {label:"Aksi", render: r => `<a href="detail.html?branch=${encodeURIComponent(r.branch)}&id=${r.id}" class="btn btn-sm btn-outline-primary">Detail</a>`}
    ]
  });

  document.getElementById("filterBranch").addEventListener("change", (e) => {
    const b = e.target.value;
    drawBranchBullets(b);
    table.setFilter(row => typeFilter(row) && (!b || row.branch === b));
  });

  document.querySelectorAll("#areaTypeTabs button").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#areaTypeTabs button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentType = btn.dataset.type;
      const b = document.getElementById("filterBranch").value;
      table.setFilter(row => typeFilter(row) && (!b || row.branch === b));
    });
  });
});
</script>
</body>
</html>
