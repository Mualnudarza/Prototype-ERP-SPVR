<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>List Area Splitter | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

      <div class="pt-3 pb-2 mb-3 border-bottom">
        <div class="page-breadcrumb">
          <a href="../../index.html">Dashboard</a><span class="sep">/</span>
          <a href="./index.html">Monitoring Infrastruktur Jaringan</a><span class="sep">/</span>
          <span class="text-dark">List Area Splitter</span>
        </div>
        <h1 class="h2 mb-0">List Area Splitter</h1>
        <p class="text-muted mb-0">Daftar area yang memiliki splitter.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Branch</label>
            <select id="filterBranch" class="form-select form-select-sm"></select>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title">Data List Area Splitter</div>
        <div id="listAreaSplitterTable"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>
  window.BASE = "../../";
  window.ACTIVE_MENU = "infra-monitoring-splitter-area";
</script>
<script src="../../assets/js/layout.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const filterBranch = document.getElementById("filterBranch");
    fillBranchSelect(filterBranch);

    const AREA_MOCKS = AREA_DATA.map((r, i) => ({
        ...r,
        number: i + 1,
        kodeArea: r.area_code || `AR-${i}`,
        redaman: `${(Math.random() * 10 + 15).toFixed(1)} dBm`,
        access: r.is_primary ? "Direct" : "Overlay",
        detail: `<a href="#" class="btn btn-sm btn-outline-primary" style="font-size:.75rem;">Detail</a>`
    }));

    const tableOpts = {
      data: AREA_MOCKS,
      columns: [
        { key: "number", label: "#" },
        { key: "branch", label: "Branch" },
        { key: "kodeArea", label: "Kode Area" },
        { key: "redaman", label: "Redaman" },
        { key: "access", label: "Access" },
        { key: "detail", label: "Detail" }
      ],
      mountId: "listAreaSplitterTable"
    };

    let listAreaSplitterTable = renderSimpleTable(tableOpts);

    function updateTable(){
      const branch = filterBranch.value;
      listAreaSplitterTable.setFilter(r => !branch || r.branch === branch);
    }

    filterBranch.addEventListener("change", updateTable);
    updateTable();
  });
</script>
</body>
</html>
