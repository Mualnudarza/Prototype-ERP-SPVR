<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monitor ODP | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

      <div class="pt-3 pb-2 mb-3 border-bottom">
        <div class="page-breadcrumb">
          <a href="../../index.html">Dashboard</a><span class="sep">/</span>
          <a href="./index.html">Monitoring Infrastruktur Jaringan</a><span class="sep">/</span>
          <span class="text-dark">Monitor ODP</span>
        </div>
        <h1 class="h2 mb-0">Monitor ODP</h1>
        <p class="text-muted mb-0">Monitoring status ODP regional.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Branch</label>
            <select id="filterBranch" class="form-select form-select-sm"></select>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title">Data Monitor ODP</div>
        <div id="monitorOdpTable"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>
  window.BASE = "../../";
  window.ACTIVE_MENU = "infra-monitoring-odp";
</script>
<script src="../../assets/js/layout.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const filterBranch = document.getElementById("filterBranch");
    fillBranchSelect(filterBranch);

    // Mocks for Monitor ODP
    const ODP_MOCKS = WO_DISTRIBUTION.map((w, i) => ({
      ...w,
      kodeArea: w.area,
      splitterReadyRK1: Math.floor(Math.random() * 5),
      splitterReadyRK2: Math.floor(Math.random() * 5),
      number: i + 1,
      placement: i % 2 === 0 ? "Indoor" : "Outdoor",
      media: "Fiber",
      totalBox: Math.floor(Math.random() * 10) + 1,
      listSplitterODP: w.kode,
      sisaPort: Math.floor(Math.random() * 8)
    }));

    const tableOpts = {
      data: ODP_MOCKS,
      columns: [
        { key: "branch", label: "Branch" },
        { key: "kodeArea", label: "Kode Area" },
        { key: "splitterReadyRK1", label: "Splitter Ready RK-1" },
        { key: "splitterReadyRK2", label: "Splitter Ready RK-2" },
        { key: "number", label: "#" },
        { key: "placement", label: "Placement" },
        { key: "media", label: "Media" },
        { key: "totalBox", label: "Total BOX" },
        { key: "listSplitterODP", label: "List Splitter ODP" },
        { key: "sisaPort", label: "Sisa Port" }
      ],
      mountId: "monitorOdpTable"
    };

    let monitorOdpTable = renderSimpleTable(tableOpts);

    function updateTable(){
      const branch = filterBranch.value;
      monitorOdpTable.setFilter(r => !branch || r.branch === branch);
    }

    filterBranch.addEventListener("change", updateTable);
    updateTable();
  });
</script>
</body>
</html>
