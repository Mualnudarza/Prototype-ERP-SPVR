<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Progress Konfigurasi | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

      <div class="page-header">
        <div class="page-breadcrumb">
          <a href="../../index.html">Dashboard</a><span class="sep">/</span>
          <a href="./index.html">Monitoring Infrastruktur Jaringan</a><span class="sep">/</span>
          <span class="text-dark">Progress Konfigurasi</span>
        </div>
        <h1 class="page-title">Progress Konfigurasi</h1>
        <p class="page-description">Progres konfigurasi splitter.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">

        </div>
      </div>

      <div class="panel-card">
        <div class="panel-title d-flex justify-content-between align-items-center">
          <span>Data Progress Konfigurasi</span>
          <span class="badge bg-secondary" id="totalProgress" style="font-size:0.9rem;">Total: 0</span>
        </div>
        <div id="progressKonfigurasiTable"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>
  window.BASE = "../../";
  window.ACTIVE_MENU = "infra-monitoring-progress";
</script>
<script src="../../assets/js/layout.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const PROGRESS_MOCKS = WO_DISTRIBUTION.map((w, i) => ({
      ...w,
      number: i + 1,
      placement: i % 2 === 0 ? 'Indoor' : 'Outdoor',
      typeSplitter: w.type_splitter || "1:8",
      konfigurasiParent: `ODC-${Math.floor(Math.random() * 10) + 1}`,
      konfigurasiRoute: `Route/Port-${Math.floor(Math.random() * 8) + 1}`
    }));

    const tableOpts = {
      data: PROGRESS_MOCKS,
      columns: [
        { key: "number", label: "#" },
        { key: "branch", label: "Branch" },
        { key: "area", label: "Area" },
        { key: "placement", label: "Placement" },
        { key: "typeSplitter", label: "Type Splitter" },
        { key: "kode", label: "Kode" },
        { key: "konfigurasiParent", label: "Konfigurasi Parent" },
        { key: "konfigurasiRoute", label: "Konfigurasi Route" }
      ],
      mountId: "progressKonfigurasiTable"
    };

    let progressKonfigurasiTable = renderSimpleTable(tableOpts);

    function updateTable(){
      const branch = getGlobalBranch();
      progressKonfigurasiTable.setFilter(r => !branch || r.branch === branch);
      const filteredCount = PROGRESS_MOCKS.filter(r => !branch || r.branch === branch).length;
      document.getElementById("totalProgress").textContent = `Total: ${filteredCount}`;
    }

    window.addEventListener("globalBranchChange", updateTable);
    updateTable();
  });
</script>
</body>
</html>
