<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Account Executive | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

      <div class="pt-3 pb-2 mb-3 border-bottom">
        <div class="page-breadcrumb">
          <a href="../../index.html">Dashboard</a><span class="sep">/</span>
          <span>Man Power Planning</span><span class="sep">/</span>
          <span class="text-dark">Account Executive</span>
        </div>
        <h1 class="h2 mb-0">Monitoring Account Executive (AE)</h1>
        <p class="text-muted mb-0">Monitoring jumlah dan persebaran Account Executive pada setiap branch regional.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Branch</label>
            <select id="filterBranch" class="form-select form-select-sm"></select>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6 col-md-4"><div class="kpi-card"><div class="kpi-label">Total AE</div><div class="kpi-value" id="kpiTotal">0</div></div></div>
        <div class="col-6 col-md-4"><div class="kpi-card"><div class="kpi-label">AE Aktif</div><div class="kpi-value text-success" id="kpiAktif">0</div></div></div>
        <div class="col-6 col-md-4"><div class="kpi-card"><div class="kpi-label">AE Non Aktif</div><div class="kpi-value text-danger" id="kpiNonAktif">0</div></div></div>
      </div>

      <div class="panel-card">
        <div class="panel-title">Jumlah Account Executive per Branch</div>
        <canvas id="aeChart" height="220"></canvas>
      </div>

      <div class="panel-card">
        <div class="panel-title">Daftar Account Executive</div>
        <div id="aeTable"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>
  window.BASE = "../../";
  window.ACTIVE_MENU = "mpp-ae";
</script>
<script src="../../assets/js/layout.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  fillBranchSelect(document.getElementById("filterBranch"));

  function refreshKpi(rows){
    document.getElementById("kpiTotal").textContent = rows.length;
    document.getElementById("kpiAktif").textContent = rows.filter(r=>r.status==="Aktif").length;
    document.getElementById("kpiNonAktif").textContent = rows.filter(r=>r.status==="Non Aktif").length;
  }
  refreshKpi(AE_DATA);

  const countByBranch = BRANCHES.map(b => AE_DATA.filter(a => a.branch === b).length);
  new Chart(document.getElementById("aeChart"), {
    type: "bar",
    data: { labels: BRANCHES, datasets: [{ label: "Jumlah AE", data: countByBranch, backgroundColor: "#2778c4" }] },
    options: { plugins: { legend: { display:false } }, scales: { x: { ticks:{ autoSkip:false, maxRotation:60, minRotation:40 } } } }
  });

  let filters = { branch: "" };
  function ff(r){ return !filters.branch || r.branch === filters.branch; }
  const table = renderSimpleTable({
    mountId: "aeTable", data: AE_DATA, filterFn: ff,
    searchKeys: ["fullname","nickname","nip"],
    columns: [
      {label:"Branch", key:"branch"}, {label:"NIP", key:"nip"}, {label:"Nama Lengkap", key:"fullname"},
      {label:"Nick Name", key:"nickname"}, {label:"No. Telepon", key:"phone"}, {label:"Status", render:r=>badge(r.status)}
    ]
  });

  document.getElementById("filterBranch").addEventListener("change", e => {
    filters.branch = e.target.value;
    table.setFilter(ff);
    refreshKpi(AE_DATA.filter(ff));
  });
});
</script>
</body>
</html>
