<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tim Teknisi | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">

      <div class="pt-3 pb-2 mb-3 border-bottom">
        <div class="page-breadcrumb">
          <a href="../../index.html">Dashboard</a><span class="sep">/</span>
          <span>Man Power Planning</span><span class="sep">/</span>
          <span class="text-dark">Tim Teknisi</span>
        </div>
        <h1 class="h2 mb-0">Monitoring Tim Teknisi</h1>
        <p class="text-muted mb-0">Monitoring struktur dan ketersediaan tim teknisi pada setiap branch regional.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">
          <div class="col-6 col-md-3">
            <label class="form-label mb-1">Branch</label>
            <select id="filterBranch" class="form-select form-select-sm"></select>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6 col-md-4"><div class="kpi-card"><div class="kpi-label">Total Tim Teknisi</div><div class="kpi-value" id="kpiTotal">0</div></div></div>
        <div class="col-6 col-md-4"><div class="kpi-card"><div class="kpi-label">Tim Aktif</div><div class="kpi-value text-success" id="kpiAktif">0</div></div></div>
        <div class="col-6 col-md-4"><div class="kpi-card"><div class="kpi-label">Lead Sedang Training/Off</div><div class="kpi-value" id="kpiTraining">0</div></div></div>
      </div>

      <div class="panel-card">
        <div class="panel-title">Jumlah Tim Teknisi per Branch</div>
        <canvas id="teamChart" height="220"></canvas>
      </div>

      <div class="panel-card">
        <div class="panel-title">Daftar Tim Teknisi</div>
        <div id="teamTable"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>
  window.BASE = "../../";
  window.ACTIVE_MENU = "mpp-team";
</script>
<script src="../../assets/js/layout.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  fillBranchSelect(document.getElementById("filterBranch"));

  function refreshKpi(rows){
    document.getElementById("kpiTotal").textContent = rows.length;
    document.getElementById("kpiAktif").textContent = rows.filter(r=>r.team_status==="Aktif").length;
    document.getElementById("kpiTraining").textContent = rows.filter(r=>r.lead_status==="Training"||r.lead_status==="Off").length;
  }
  refreshKpi(TIM_TEKNISI_DATA);

  const countByBranch = BRANCHES.slice(0,6).map(b => TIM_TEKNISI_DATA.filter(t => t.branch === b).length);
  new Chart(document.getElementById("teamChart"), {
    type: "bar",
    data: { labels: BRANCHES.slice(0,6), datasets: [{ label: "Jumlah Tim", data: countByBranch, backgroundColor: "#2778c4" }] },
    options: { plugins: { legend: { display:false } } }
  });

  let filters = { branch: "" };
  function ff(r){ return !filters.branch || r.branch === filters.branch; }
  const table = renderSimpleTable({
    mountId: "teamTable", data: TIM_TEKNISI_DATA, filterFn: ff,
    searchKeys: ["team_name","lead_name","branch"],
    columns: [
      {label:"Branch", key:"branch"}, {label:"Nama Team", key:"team_name"}, {label:"Lead NIP", key:"lead_nip"},
      {label:"Nama Lead", key:"lead_name"}, {label:"Lead Status", render:r=>badge(r.lead_status)},
      {label:"Team Status", render:r=>badge(r.team_status)}
    ]
  });

  document.getElementById("filterBranch").addEventListener("change", e => {
    filters.branch = e.target.value;
    table.setFilter(ff);
    refreshKpi(TIM_TEKNISI_DATA.filter(ff));
  });
});
</script>
</body>
</html>
