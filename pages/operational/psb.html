<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modul Operasional & Teknis | GriyaNet ERP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
<div id="app-navbar"></div>
<div class="container-fluid">
  <div class="row">
    <div id="app-sidebar"></div>
    <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
      <div class="page-header">
        <div class="page-breadcrumb"><a href="../../index.html">Dashboard</a><span class="sep">/</span><span>Operational &amp; Technical</span><span class="sep">/</span><span class="text-dark">Quality Control</span></div>
        <h1 class="page-title">Modul Operasional &amp; Teknis</h1>
        <p class="page-description">Pusat monitoring read-only untuk PSB, TSO, Dismantle, dan Distribution regional.</p>
      </div>

      <div class="filter-bar">
        <div class="row g-2 align-items-end">

          <div class="col-6 col-md-3"><label>Tanggal</label><input type="date" class="form-control form-control-sm" id="filterTanggal" value="2026-07-13"></div>
        </div>
      </div>

      <div class="ops-tabs mb-3" id="opsTabs">
        <button class="ops-tab active" data-view="psb">PSB</button>
        <button class="ops-tab" data-view="tso">TSO</button>
        <button class="ops-tab" data-view="dismantle">Dismantle</button>
        <button class="ops-tab" data-view="distribution">Distribution</button>
      </div>

      <div id="viewMount"></div>
    </main>
  </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title" id="detailTitle">Detail</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body"><div id="detailRows"></div></div>
      <div class="modal-footer"><span class="text-muted small me-auto">Mode read-only sesuai halaman existing ERP.</span><button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Tutup</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/common.js"></script>
<script>window.BASE="../../"; window.ACTIVE_MENU="op-psb";</script>
<script src="../../assets/js/layout.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const state = { view:"psb" };
  const viewMount = document.getElementById("viewMount");

  function byBranch(r){ const b = getGlobalBranch(); return !b || !r.branch || r.branch === b; }
  function showDetail(title, rows){
    document.getElementById("detailTitle").textContent = title;
    document.getElementById("detailRows").innerHTML = rows.map(r=>`<div class="detail-row"><div class="detail-label">${r[0]}</div><div class="detail-value">${r[1]}</div></div>`).join("");
    new bootstrap.Modal(document.getElementById("detailModal")).show();
  }
  function kpi(items){ return `<div class="row g-3 mb-3">${items.map(x=>`<div class="col-6 col-md-3"><div class="kpi-card mono"><div class="kpi-label">${x[0]}</div><div class="kpi-value">${x[1]}</div></div></div>`).join("")}</div>`; }
  function actions(cls,id){ return `<button class="btn btn-sm btn-outline-primary ${cls}" data-id="${id}">Detail</button>`; }

  function renderFilteredTable(mountId, opts){
    const mount = document.getElementById(mountId);
    if(!mount) return;
    const statuses = opts.statuses || [];
    let flt = "all";
    const btnHtml = ["all",...statuses].map(s=>
      `<button class="btn btn-sm btn-outline-primary${s==="all"?" active":""}" data-flt="${s}">${s==="all"?"Semua":s}</button>`
    ).join("");
    mount.innerHTML = `<div class="panel-title"><span>${opts.title}</span><div class="btn-group btn-group-sm" role="group">${btnHtml}</div></div><div id="${mountId}-t"></div>`;
    const tbl = renderSimpleTable({
      mountId:mountId+"-t", data:opts.data, searchKeys:opts.searchKeys, columns:opts.columns,
      filterFn: r => flt==="all" || r.status===flt
    });
    mount.addEventListener("click", e => {
      const btn = e.target.closest("[data-flt]"); if(!btn) return;
      flt = btn.dataset.flt;
      mount.querySelectorAll("[data-flt]").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      tbl.setFilter(r => flt==="all" || r.status===flt);
    });
  }

  const views = {
    psb(){
      const wo = WO_INSTALASI.filter(byBranch);
      const wl = WAITLIST_PSB.filter(byBranch);
      viewMount.innerHTML = kpi([["WO Instalasi Hari Ini",wo.length],["Wait List PSB",wl.length],["Tim Teknisi",TEAM_MONITORING.filter(byBranch).length],["WO Berjalan",wo.filter(r=>r.status!=="Selesai").length]]) +
        `<div class="panel-card" id="p-wo"></div>` +
        `<div class="panel-card" id="p-wl"></div>`;
      renderFilteredTable("p-wo",{title:"Tabel WO Instalasi Hari Ini",data:wo,statuses:["Menunggu Teknisi","Dalam Proses","Selesai","Gagal Instalasi"],searchKeys:["customer_name","pppoe_secret","team","sn"],
        columns:[{label:"Branch",key:"branch"},{label:"PPPoE Secret",key:"pppoe_secret"},{label:"Nama Customer",key:"customer_name"},{label:"Team",key:"team"},{label:"KaTIM",key:"katim"},{label:"Access",key:"access"},{label:"Serial Number",key:"sn"},{label:"Status",render:r=>badge(r.status)},{label:"Detail",render:r=>actions("d-psb",r.id)}]});
      renderFilteredTable("p-wl",{title:"Tabel Wait List PSB",data:wl,statuses:["Menunggu Pembayaran","Menunggu Penjadwalan"],searchKeys:["customer_name","customer_id","alamat"],
        columns:[{label:"Branch",key:"branch"},{label:"Nama Customer",key:"customer_name"},{label:"ID Pelanggan",key:"customer_id"},{label:"Paket Layanan",key:"package"},{label:"Sales",key:"sales"},{label:"Surveyor",key:"surveyor"},{label:"Alamat",key:"alamat"},{label:"Status",render:r=>badge(r.status)},{label:"Detail",render:r=>actions("d-psb-wl",r.id)}]});
    },
    tso(){
      const wo = WO_TSO.filter(byBranch);
      const wl = WAITLIST_TSO.filter(byBranch);
      viewMount.innerHTML = kpi([["WO TSO Aktif",wo.length],["Wait List TSO",wl.length],["WO Selesai Hari Ini",wo.filter(r=>r.status==="Selesai").length],["WO Dalam Proses",wo.filter(r=>r.status==="Dalam Proses").length]]) +
        `<div class="panel-card" id="t-wo"></div>` +
        `<div class="panel-card" id="t-wl"></div>`;
      renderFilteredTable("t-wo",{title:"Tabel WO TSO Aktif",data:wo,statuses:["Wait List","Penjadwalan","Dalam Proses","Selesai"],searchKeys:["customer_name","pppoe_secret","team_katim"],
        columns:[{label:"Branch",key:"branch"},{label:"Tipe WO",key:"type"},{label:"PPPoE Secret",key:"pppoe_secret"},{label:"Nama Customer",key:"customer_name"},{label:"Team / KaTIM",key:"team_katim"},{label:"Access",key:"access"},{label:"Status",render:r=>badge(r.status)},{label:"Detail",render:r=>actions("d-tso",r.id)}]});
      renderFilteredTable("t-wl",{title:"Tabel Wait List TSO",data:wl,statuses:["Menunggu Pembayaran","Menunggu Penjadwalan"],searchKeys:["customer_name","pppoe_secret","access"],
        columns:[{label:"Branch",key:"branch"},{label:"PPPoE Secret",key:"pppoe_secret"},{label:"Nama Customer",key:"customer_name"},{label:"Tipe TSO",key:"type"},{label:"Waktu Komplain",key:"waktu_komplain"},{label:"Waktu Eskalasi",key:"waktu_eskalasi"},{label:"Access",key:"access"},{label:"Port Access",key:"port_access"},{label:"Detail",render:r=>actions("d-tso-wl",r.id)}]});
    },
    dismantle(){
      const wo = WO_DISMANTLE.filter(byBranch);
      const wl = WO_DISMANTLE.filter(r=>r.status==="Menunggu Penjadwalan"&&byBranch(r));
      viewMount.innerHTML = kpi([["WO Dismantle Hari Ini",wo.filter(r=>r.status==="Terjadwal Hari Ini").length],["Menunggu Penjadwalan",wl.length],["WO Selesai",HISTORI_DISMANTLE.filter(byBranch).length],["WO Berjalan",wo.filter(r=>r.status!=="Selesai").length]]) +
        `<div class="panel-card" id="d-wo"></div>` +
        `<div class="panel-card" id="d-wl"></div>`;
      const cols = [{label:"Branch",key:"branch"},{label:"Nama Customer",key:"customer_name"},{label:"PPPoE Secret",key:"pppoe_secret"},{label:"Nomor Telepon",key:"phone"},{label:"Sales",key:"sales"},{label:"Terminator",key:"terminator"},{label:"Alamat",key:"alamat"},{label:"Expired Date",key:"expired_date"},{label:"Suggest Pengambilan",key:"pickup_suggestion"},{label:"Status",render:r=>badge(r.status)},{label:"Detail",render:r=>actions("d-dis",r.id)}];
      renderFilteredTable("d-wo",{title:"Tabel WO Dismantle",data:wo,statuses:["Menunggu Penjadwalan","Terjadwal Hari Ini","Selesai"],searchKeys:["customer_name","pppoe_secret","alamat"],columns:cols});
      renderFilteredTable("d-wl",{title:"Tabel Wait List Dismantle",data:wl,statuses:["Menunggu Penjadwalan"],searchKeys:["customer_name","pppoe_secret","alamat"],columns:cols.filter(c=>c.label!=="Status")});
    },
    distribution(){
      const wo = WO_DISTRIBUTION.filter(byBranch);
      viewMount.innerHTML = kpi([["Splitter Belum Terkonfigurasi",WAITLIST_DISTRIBUTION.length],["Progress Konfigurasi",wo.filter(r=>r.status==="Dalam Proses").length],["Splitter Ready To WO",wo.filter(r=>r.status==="Selesai").length],["WO Distribution",wo.length]]) +
        `<div class="panel-card" id="dt-wo"></div>` +
        `<div class="panel-card" id="dt-wl"></div>`;
      renderFilteredTable("dt-wo",{title:"Tabel WO Distribution Aktif",data:wo,statuses:["Dalam Proses","Selesai","Pending"],searchKeys:["area","kode","katim"],
        columns:[{label:"Branch",key:"branch"},{label:"Area",key:"area"},{label:"Type Splitter",key:"type_splitter"},{label:"Kode Splitter",key:"kode"},{label:"KaTIM",key:"katim"},{label:"Tanggal",key:"tanggal"},{label:"Phase",key:"phase"},{label:"Status",render:r=>badge(r.status)},{label:"Detail",render:r=>actions("d-dist",r.id)}]});
      renderSimpleTable({mountId:"dt-wl",data:WAITLIST_DISTRIBUTION,searchKeys:["area","placement","kode"],
        columns:[{label:"Area",key:"area"},{label:"Placement",key:"placement"},{label:"Type Splitter",key:"type_splitter"},{label:"Kode Splitter",key:"kode"}]});
      document.querySelector("#dt-wl .panel-card") || document.getElementById("dt-wl").insertAdjacentHTML("afterbegin",'<div class="panel-title">Tabel Wait List Distribution</div>');
    }
  };

  function render(){ views[state.view](); }
  render();
  document.getElementById("opsTabs").addEventListener("click", e => { const b=e.target.closest("button"); if(!b) return; document.querySelectorAll(".ops-tab").forEach(x=>x.classList.remove("active")); b.classList.add("active"); state.view=b.dataset.view; render(); });
  window.addEventListener("globalBranchChange", render);
  document.getElementById("viewMount").addEventListener("click", e => {
    const b=e.target.closest("button[data-id]"); if(!b) return;
    const map = {"d-psb":[WO_INSTALASI,"Detail Pemasangan"],"d-psb-wl":[WAITLIST_PSB,"Detail Pemasangan"],"d-tso":[WO_TSO,"Detail Troubleshoot"],"d-tso-wl":[WAITLIST_TSO,"Detail Troubleshoot"],"d-dis":[WO_DISMANTLE,"Detail WO Terminate"],"d-dist":[WO_DISTRIBUTION,"Detail WO Distribution"]};
    const cls = Object.keys(map).find(k=>b.classList.contains(k)); if(!cls) return;
    const [data,title] = map[cls]; const row = data.find(r=>r.id==b.dataset.id);
    showDetail(title, Object.entries(row).map(([k,v])=>[k.replaceAll("_"," "), k==="status"?badge(v):v]));
  });
});
</script>
</body>
</html>
